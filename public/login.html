<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hiraeth | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="./assets/icon/favicon(Hiraeth).png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <div class="header">
        <div class="container">
            <a href="index.html" class="logo_link">
                <h1 class="titulo">Hiraeth</h1>
            </a>

            <ul class="navbar">
                <li>
                    <a href="login.html">Login</a>
                </li>
                <li>|</li>
                <li>
                    <a href="cadastro.html">Cadastro</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="login">
        <div class="container">

            <!-- formulário de login -->
            <div class="card-login">
                <h2>Olá de volta!</h2>
                <p class="login-subtitle">Retorne ao seu universo literário.</p>

                <div class="formulario">
                    <div class="campo">
                        <span>E-mail</span>
                        <input id="email_input" type="text" placeholder="Digite seu e-mail">
                    </div>

                    <div class="campo">
                        <span>Senha</span>
                        <input id="senha_input" type="password" placeholder="Digite sua senha">
                    </div>

                    <button class="botao" onclick="entrar()">Entrar</button>

                    <div class="alerta_erro">
                        <div class="card_erro" id="cardErro">
                            <span id="mensagem_erro"></span>
                        </div>
                    </div>
                </div>
                <div id="div_message_results"></div>

                <div id="div_erros_login"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="footer-brand">Hiraeth</p>
            <p class="footer-phrase">Entre histórias, memórias e pertencimento</p>
        </div>
    </div>

</body>

</html>

<script>

    // Array que armazena os usuários cadastrados retornados do banco
    let listaUsuariosCadastrados = [];

    // Função que busca os usuários cadastrados no BD
    function UsuariosCadastrados() {

        // Faz uma requisição GET para a rota /usuarios/ (retorna a lista de usuários cadastrados)
        fetch("/usuarios/", {
            method: "GET",
        }).then(function (resposta) {

            // Verifica se a resposta da requisição foi bem-sucedida
            if (resposta.ok) {
                console.log(resposta);

                // Converte a resposta para json e armazena em listaUsuariosCadastrados
                resposta.json().then(obj => {
                    listaUsuariosCadastrados = obj;
                    console.log(listaUsuariosCadastrados);

                }
                )
            }
        })
    };

    function entrar() {

        // Valores digitados nos campos de e-mail e senha
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        // Valida se os campos obrigatórios foram preenchidos
        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "Necessário o preenchimento de todos os campos";
            return false;
        }
        else {
            // Esconde a mensagem de erro após 5 segundos
            setInterval(sumirMensagem, 5000)
        }

        // Controla se o usuário foi encontrado na lista
        let encontrou = false;

        // Percorre a lista de usuários cadastrados para verificar se o e-mail e senha existem
        for (let i = 0; i < listaUsuariosCadastrados.length; i++) {
            if (listaUsuariosCadastrados[i].email == emailVar && listaUsuariosCadastrados[i].senha == senhaVar) {
                encontrou = true;
                break
            }
        }

        // Se o usuário foi encontrado, realiza a autenticação no back-end
        if (encontrou) {

            console.log("FORM LOGIN: ", emailVar);
            console.log("FORM SENHA: ", senhaVar);

            // Envia os dados de login para a rota de autenticação
            fetch("/usuarios/autenticar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailServer: emailVar,
                    senhaServer: senhaVar
                })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()!")

                // Se a autenticação deu certo, armazena os dados do usuário na sessão
                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));

                        // Salva informações do usuário no sessionStorage para usar em outras páginas (é um recurso de armazenamento no navegador que permite guardar 
                        // dados temporariamente durante a sessão atual) 
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;

                        // Redireciona o usuário para a página inicial da plataforma
                        setTimeout(function () {
                            console.log('entrou');

                            window.location = "./inicio.html";
                        });

                    });

                } else {

                    // Se a autenticação falhar, exibe o erro no console
                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then(texto => {
                        console.error(texto);
                    });
                }

            }).catch(function (erro) {
                console.log(erro);
            })

            return false;
        }
        else {
            // Se o usuário não existir na lista carregada, irá exibir a mensagem de usuário não encontrado
            div_message_results.innerHTML = '<br><span style = "color: #3B2A24">Login não encontrado</span>'
        }
    }

    // Função que esconde o card de erro
    function sumirMensagem() {
        cardErro.style.display = "none"
    }

    // Chama a função assim que a página carrega para buscar os usuários cadastrados
    UsuariosCadastrados()

</script>
