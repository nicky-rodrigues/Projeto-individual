<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hiraeth | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon(Hiraeth).png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <div class="header">
    <div class="container">
      <a href="index.html" class="logo_link">
        <h1 class="titulo">Hiraeth</h1>
      </a>

      <ul class="navbar">
        <li>
          <a href="login.html">Login</a>
        </li>
        <li>|</li>
        <li>
          <a href="cadastro.html">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>



  <div class="login">

    <div class="container">

      <!-- Formulário de cadastro -->
      <div class="card-cadastro">
        <h2>Crie sua conta</h2>
        <p class="login-subtitle">Comece sua jornada literária em Hiraeth.</p>

        <div class="formulario">
          <div class="campo">
            <span>Nome</span>
            <input id="nome_input" type="text" placeholder="Digite seu nome" />
          </div>

          <div class="campo">
            <span>E-mail</span>
            <input id="email_input" type="text" placeholder="Digite seu e-mail" />
          </div>

          <div class="campo">
            <span>Senha</span>
            <input id="senha_input" type="password" placeholder="Digite sua senha" />
          </div>

          <div class="campo">
            <span>Confirmação da senha</span>
            <input id="confirmacao_senha_input" type="password" placeholder="Confirme sua senha" />
          </div>

          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div class="card_erro" id="cardErro">
          <span id="mensagem_erro"></span>
        </div>


        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>



  <div class="footer">
    <div class="container">
      <p class="footer-brand">Hiraeth</p>
      <p class="footer-phrase">Entre histórias, memórias e pertencimento</p>
    </div>
  </div>
</body>

</html>

<script>


  function cadastrar() {

    // Valores recebidos dos campos do formulário
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Valida se todos os campos foram preenchidos
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = 'Necessário o preenchimento de todos os campos';
      return false;
    }

    // Valida se a senha e a confirmação de senha são iguais
    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "As senhas não coincidem";
      return false;
    } else {

      // Esconde o card de erro caso as validações estejam corretas
      cardErro.style.display = "none";
    }

    // Envia os dados do cadastro para o back-end
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },

      // Converte os dados do formulário para json
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso!";

          // Redireciona o usuário para a tela de login após o cadastro
          setTimeout(() => {
            window.location = "./login.html";
          });

          // Limpa os campos do formulário
          limparFormulario();
        } else {

          // Se a resposta não seja ok, é lançada uma mensagem de erro
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        
        // Captura e exibe erros da requisição
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }

</script>
